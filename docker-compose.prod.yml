services:
  pixdock:
    image: ghcr.io/stormixus/pixdock:latest
    ports:
      - "${PIXDOCK_PORT:-8420}:8420"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RUST_LOG=pixdock=info
      - PIXDOCK_TOKEN=${PIXDOCK_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8420/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
