services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8420:8420"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RUST_LOG=pixdock=debug
      # Set PIXDOCK_TOKEN to enable bearer token auth (leave empty to disable)
      # - PIXDOCK_TOKEN=your-secret-token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8420/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
